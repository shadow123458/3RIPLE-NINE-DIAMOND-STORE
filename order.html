<script>
document.getElementById("orderForm").addEventListener("submit", function(e){

    e.preventDefault();

    const uid =
    document.querySelector('input[placeholder="Enter UID"]').value;

    const nickname =
    document.querySelector('input[placeholder="Enter Nickname"]').value;

    const selects =
    document.querySelectorAll("select");

    const product = selects[1].value;
    const payment = selects[2].value;

    const message =
`🎮 3RIPLE NINE DIAMOND STORE

👤 Player: ${nickname}

🆔 UID: ${uid}

💎 Product: ${product}

💳 Payment: ${payment}`;

    const whatsapp =
    "https://wa.me/94773169055?text=" +
    encodeURIComponent(message);

    window.open(whatsapp, "_blank");

});
</script>
